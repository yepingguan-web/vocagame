<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>词汇闯关 · 中英配对</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f0f23;color:#e8e8f0;min-height:100vh;overflow-x:hidden}
.container{max-width:900px;margin:0 auto;padding:20px}
h1{text-align:center;font-size:1.8em;color:#7dd3fc;margin-bottom:4px;letter-spacing:2px;word-break:break-word}
.subtitle{text-align:center;color:#64748b;font-size:.82em;margin-bottom:20px;word-break:break-word}
.card{background:#1e1e3a;border-radius:16px;padding:24px;box-shadow:0 4px 24px rgba(0,0,0,.4);margin-bottom:16px}
.level-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:8px;margin-top:16px}
.level-btn{background:#252545;border:2px solid #3a3a5a;border-radius:10px;padding:12px 4px;text-align:center;cursor:pointer;transition:all .2s;color:#94a3b8;font-size:.8em}
.level-btn:hover{border-color:#7dd3fc;background:#1a2a3a}
.level-btn.done{border-color:#4ade80;background:#052016}
.level-btn .lnum{font-size:1.1em;font-weight:700;display:block;color:#e2e8f0}
.level-btn .lcount{font-size:.7em;color:#64748b;display:block;margin-top:2px}
.level-btn .lcount.ok{color:#4ade80}
.question{text-align:center;margin-bottom:20px}
.qword{font-size:1.6em;font-weight:700;color:#7dd3fc;letter-spacing:1px;word-break:break-word}
.qtype{font-size:.8em;color:#64748b;margin-top:4px}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.option{background:#252545;border:2px solid #3a3a5a;border-radius:10px;padding:14px 12px;text-align:center;cursor:pointer;transition:all .2s;font-size:.95em;color:#cbd5e1;min-height:52px;display:flex;align-items:center;justify-content:center;word-break:break-word}
.option:hover{border-color:#7dd3fc;background:#1a2a3a}
.option.correct{border-color:#4ade80;background:#052016;color:#4ade80}
.option.wrong{border-color:#f87171;background:#2a0a0a;color:#f87171}
.option:disabled{cursor:default}
.progress-bar{height:6px;background:#2a2a4a;border-radius:3px;margin-top:16px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#7dd3fc,#4ade80);border-radius:3px;transition:width .4s ease}
.stats{display:flex;justify-content:center;gap:32px;margin-top:16px;color:#94a3b8;font-size:.85em}
.stats span{color:#e2e8f0}
.btn{background:#2563eb;border:none;border-radius:8px;color:#fff;padding:10px 24px;font-size:.95em;cursor:pointer;transition:background .2s}
.btn:hover{background:#1d4ed8}
.btn-ghost{background:transparent;border:1px solid #3a3a5a;color:#94a3b8}
.btn-ghost:hover{border-color:#7dd3fc;color:#7dd3fc}
.btn-row{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.mode-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.mode-tab{padding:8px 20px;border-radius:8px;border:2px solid #3a3a5a;background:transparent;color:#94a3b8;cursor:pointer;font-size:.9em;transition:all .2s}
.mode-tab.active{border-color:#7dd3fc;background:#1a2a3a;color:#7dd3fc}
.hint-btn{background:transparent;border:1px solid #3a3a5a;border-radius:6px;color:#64748b;padding:6px 14px;font-size:.8em;cursor:pointer;margin-top:12px}
.hint-btn:hover{border-color:#7dd3fc;color:#7dd3fc}
.hint-text{color:#fbbf24;font-size:.85em;margin-top:8px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:#1e1e3a;border-radius:16px;padding:32px;max-width:420px;text-align:center;width:90%;max-height:90vh;overflow-y:auto}
.modal h2{color:#7dd3fc;margin-bottom:16px;font-size:1.4em}
.modal .score-big{font-size:3em;font-weight:700;color:#fbbf24;margin:16px 0}
.modal .acc{color:#4ade80;font-size:1.1em}
.modal .msg{margin-top:12px;color:#94a3b8;font-size:.85em}
.match-area{display:flex;flex-wrap:wrap;justify-content:center;gap:24px;margin-top:20px}
.match-col{display:flex;flex-direction:column;gap:8px;min-width:120px}
.match-item{padding:10px 16px;border-radius:8px;border:2px solid #3a3a5a;background:#1a1a2e;color:#e8e8f0;cursor:pointer;transition:all .2s;text-align:center;font-size:.9em;user-select:none;min-width:100px;word-break:break-word}
.match-item:hover{border-color:#7dd3fc}
.match-item.selected{border-color:#7dd3fc;background:#1a2a3a;color:#7dd3fc;box-shadow:0 0 8px rgba(125,211,252,.3)}
.match-item.matched{border-color:#4ade80;background:#052016;color:#4ade80;cursor:default;opacity:.7}
.match-item.wrong-flash{border-color:#f87171;background:#2a0a0a;color:#f87171;animation:shake .4s}
.match-group-label{color:#94a3b8;font-size:.85em;text-align:center;margin:12px 0 4px;padding:4px 16px;background:#2a2a4a;border-radius:6px;display:inline-block}
.match-progress{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.match-dot{width:14px;height:14px;border-radius:50%;background:#3a3a5a;transition:all .3s}
.match-dot.cur{background:#7dd3fc;transform:scale(1.2)}
.match-dot.ok{background:#4ade80}
.match-dot.err{background:#f87171}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@media(max-width:600px){
  .options-grid{grid-template-columns:1fr}
  .level-grid{grid-template-columns:repeat(auto-fill,minmax:65px,1fr)}
  .qword{font-size:1.3em}
  .match-area{gap:12px}
  .match-col{min-width:90px}
}

.timer-display{font-size:1.3em;font-weight:700;color:#fbbf24;font-variant-numeric:tabular-nums;min-width:80px;text-align:center;padding:4px 0}
.pb-badge{font-size:.85em;color:#a78bfa;margin-left:12px}
</style>
</head>
<body>
<div class="container">
<h1 id="gTitle">词汇闯关 · 中英配对</h1>
<p class="subtitle" id="gSub">新概念 4</p>

<div id="levelView" class="card">
  <div style="text-align:center;color:#94a3b8;font-size:.85em;margin-bottom:8px">📚 选择关卡开始闯关</div>
  <div class="level-grid" id="lg"></div>
</div>

<div id="gameView" class="card" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
    <button class="btn btn-ghost" onclick="backToLevels()" style="font-size:.8em;padding:6px 14px">← 返回关卡</button>
    <span id="lvTitle" style="color:#7dd3fc;font-size:.9em">第 1 关</span>
    <div class="timer-display" id="timerDisplay">0:00</div>
    <div class="pb-badge" id="pbBadge"></div>
  </div>
  <div class="mode-tabs" id="modeTabs"></div>
  <div id="qArea">
    <div class="question">
      <div class="qword" id="qw"></div>
      <div class="qtype" id="qt"></div>
    </div>
    <div class="options-grid" id="oa"></div>
    <div style="text-align:center">
      <button class="hint-btn" id="hb" onclick="sh()">💡 提示</button>
    </div>
    <div class="hint-text" id="ht" style="display:none"></div>
  </div>
  <div id="matchArea" class="match-area" style="display:none"></div>
  <div class="progress-bar"><div class="progress-fill" id="pf"></div></div>
  <div class="stats">
    <div>✅ 正确 <span id="so">0</span></div>
    <div>❌ 错误 <span id="se">0</span></div>
  </div>
</div>
</div>

<div class="overlay" id="ov">
  <div class="modal">
    <h2 id="rt"></h2>
    <div class="score-big" id="rs"></div>
    <div class="acc" id="rsc"></div>
    <div class="acc" id="rac" style="margin-top:4px"></div>
    <div class="msg" id="rmg"></div>
    <div class="btn-row">
      <button class="btn" onclick="retry()">🔄 重玩本关</button>
      <button class="btn btn-ghost" onclick="backToLevels()">📚 返回关卡</button>
    </div>
  </div>
</div>

  const el=Math.floor((Date.now()-S.startTime)/1000);
  S.elapsed=el;
  const m=Math.floor(el/60),s=el%60;
  const td=document.getElementById("timerDisplay");
  if(td)td.textContent=m+":"+(s<10?"0":"")+s;
}
function fmtTime(ms){
  const s=Math.floor(ms/1000),m=Math.floor(s/60);
  return m+":"+(s%60<10?"0":"")+(s%60);
}
// ===== PB =====
function getPB(lv,md){return parseInt(localStorage.getItem("pb_"+lv+"_"+md)||"0");}
function setPB(lv,md,ms){
  const k="pb_"+lv+"_"+md;
  const prev=getPB(lv,md);
  if(prev===0||ms<prev){localStorage.setItem(k,ms);return true;}
  return false;
}
function getPBStr(lv,md){
  const t=getPB(lv,md);
  return t>0?"PB: "+fmtTime(t):"";
}
function $(id){return document.getElementById(id)}

function renderLv(){
  const lg=$("lg");
  lg.innerHTML="";
  LVS.forEach((key,i)=>{
    const items=D[key].filter(it=>it.cn);
    const done=JSON.parse(localStorage.getItem("vp")||"{}")[i];
    const displayName=LEVEL_NAMES[i]||('第'+(i+1)+'关');
    lg.innerHTML+='<div class="level-btn'+(done?" done":"")+'" onclick="startL('+i+')"><span class="lnum">'+displayName+'</span><span class="lcount'+(done?" ok":"")+'">'+(done?done+"/"+items.length+" ✅":items.length+"词")+'</span></div>';
  });
}

function backToLevels(){
  $("ov").classList.remove("show");
  $("gameView").style.display="none";
  $("levelView").style.display="block";
  renderLv();
}

function startL(idx){
  if(idx<0||idx>=TOTAL_LV)return;
  S.l=idx;S.q=0;S.ok=0;S.err=0;S.a=false;S.wrongList=[];S.matchRound=0;
  const lv=D[LVS[idx]];
  const items=lv.filter(it=>it.cn);
  S.ord=items.map((_,i)=>i);
  S.ord=sha(S.ord);
  $("levelView").style.display="none";
  $("gameView").style.display="block";
  $("lvTitle").textContent=LEVEL_NAMES[idx]+" · "+items.length+" 题";
  renderModes();
  startTimer();
  showQ();
}

function renderModes(){
  const c=$("modeTabs");
  c.innerHTML="";
  MODES.forEach((m,i)=>{
    const b=document.createElement("button");
    b.className="mode-tab"+(i===S.m?" active":"");
    b.textContent=m.label;
    b.onclick=()=>{S.m=i;document.querySelectorAll(".mode-tab").forEach(t=>t.classList.remove("active"));b.classList.add("active");showQ()};
    c.appendChild(b);
  });
}

function playAudio(word){
  try{
    if(window._aud){try{window._aud.pause();}catch(e){}}
    const url='https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(word)+'&type=1';
    window._aud=new Audio(url);
    const p=window._aud.play();
    if(p)p.catch(e=>console.warn('playAudio failed:',word,e));
  }catch(e){console.warn('playAudio error:',word,e);}
}

function showQ(){
  S.a=false;$("ht").style.display="none";$("hb").textContent="💡 提示";
  const lv=D[LVS[S.l]];const items=lv.filter(it=>it.cn);
  if(!items.length){backToLevels();return}
  const qi=S.ord[S.q];const it=items[qi];
  const mode=MODES[S.m];
  if(mode.id==="match"){showMatchQ();return}
  const field=mode.enFirst?"en":"cn";
  $("qArea").style.display="block";$("matchArea").style.display="none";
  if(mode.id==="listen"){
    $("qw").innerHTML='🔊';
  }else{
    $("qw").textContent=field==="en"?it.en:it.cn;
  }
  window._cw=it.en;$("qw").onclick=()=>{try{playAudio(window._cw)}catch(e){}};
  if(mode.id==="listen")setTimeout(()=>playAudio(it.en),300);
  $("qt").textContent=mode.q+"（"+(S.q+1)+"/"+S.ord.length+"）";
  $("pf").style.width=((S.q)/S.ord.length*100)+"%";
  $("so").textContent=S.ok;$("se").textContent=S.err;
  buildOpts(it,mode);
}

function buildOpts(it,mode){
  const lv=D[LVS[S.l]];const items=lv.filter(x=>x.cn);
  const correct=mode.enFirst?it.cn:it.en;
  const optField=mode.enFirst?"cn":"en";
  let pool=[];
  if(mode.id==="listen"){
    const others=mode.enFirst?items.map(x=>x.cn):items.map(x=>x.en);
    pool=others.filter(x=>x!==correct);
  }else if(optField==="cn"){
    pool=items.map(x=>x.cn).filter(x=>x!==correct);
  }else{
    pool=items.map(x=>x.en).filter(x=>x!==correct);
  }
  if(pool.length<3){
    const allItems=Object.values(D).flat().filter(x=>x.cn);
    const exclude=new Set([correct,...pool]);
    const extra=optField==="cn"?allItems.map(x=>x.cn):allItems.map(x=>x.en);
    pool=pool.concat(extra.filter(x=>!exclude.has(x)));
  }
  const others=sha(pool).slice(0,3);
  const opts=sha([correct,...others]);
  let h="";
  opts.forEach(o=>{
        h+='<button class="option" data-v="'+encodeURIComponent(String(o))+'" onclick="check(this)">'+o+'</button>';
  });
  $("oa").innerHTML=h;
}

let _correct="";
function check(btn){
  if(S.a)return;S.a=true;
  const lv=D[LVS[S.l]];const items=lv.filter(it=>it.cn);
  const qi=S.ord[S.q];const it=items[qi];
  const mode=MODES[S.m];
  var chosen="";try{chosen=decodeURIComponent(btn.dataset.v)}catch(ex){chosen=btn.dataset.v}
  _correct=mode.id==="cn-en"?it.en:it.cn;
  const isOk=chosen===_correct;
  if(isOk){btn.classList.add("correct");S.ok++;playOK()}
  else{
    btn.classList.add("wrong");
    document.querySelectorAll(".option").forEach(b=>{if(b.textContent===_correct)b.classList.add("correct")});
    S.err++;S.wrongList.push(it);playErr()
  }
  $("so").textContent=S.ok;$("se").textContent=S.err;
  if(S.q+1<S.ord.length)setTimeout(nQ,500);else setTimeout(showRes,600);
}

// ====== Match Mode ======
let M={sel:null,pairs:0,total:0};
function showMatchQ(){
  $("qArea").style.display="none";$("matchArea").style.display="flex";
  const lv=D[LVS[S.l]];const items=lv.filter(it=>it.cn);
  const maxPerRound=10;
  const totalItems=items.length;
  const startIdx=S.matchRound*maxPerRound||0;
  const endIdx=Math.min(startIdx+maxPerRound,totalItems);
  const roundItems=items.slice(startIdx,endIdx);
  const roundOrder=sha([...Array(roundItems.length).keys()]);
  const enOrder=roundOrder.slice();
  const cnOrder=sha([...roundOrder]);
  M={sel:null,pairs:0,total:roundItems.length,roundItems,roundIdx:S.matchRound||0};
  let enHtml='<div class="match-group-label">📖 英文</div>';
  let cnHtml='<div class="match-group-label">📝 中文</div>';
  enOrder.forEach((ri,i)=>{
    enHtml+='<div class="match-item" data-idx="'+ri+'" data-pair="en" onclick="matchClick(this,'+ri+')">'+roundItems[ri].en+'</div>';
  });
  cnOrder.forEach((ri,i)=>{
    cnHtml+='<div class="match-item" data-idx="'+ri+'" data-pair="cn" onclick="matchClick(this,'+ri+')">'+roundItems[ri].cn+'</div>';
  });
  $("matchArea").innerHTML='<div class="match-col" id="mcEn">'+enHtml+'</div><div class="match-col" id="mcCn">'+cnHtml+'</div>';
  $("pf").style.width=((S.q)/S.ord.length*100)+"%";
  $("so").textContent=S.ok;$("se").textContent=S.err;
  const roundNum=Math.floor(startIdx/maxPerRound)+1;
  const totalRounds=Math.ceil(totalItems/maxPerRound);
  $("qt").textContent="配对 "+(startIdx+1)+"-"+endIdx+"/"+totalItems+" (第 "+roundNum+"/"+totalRounds+" 轮)";
}
function matchClick(el,idx){
  const pair=el.getAttribute('data-pair');
  if(el.classList.contains("matched"))return;
  if(!M.sel){el.classList.add("selected");M.sel={el,idx,pair};return;}
  if(M.sel.el===el){el.classList.remove("selected");M.sel=null;return;}
  if(M.sel.pair===pair){M.sel.el.classList.remove("selected");el.classList.add("selected");M.sel={el,idx,pair};return;}
  const first=M.sel;
  if(first.idx===idx){
    first.el.classList.remove("selected");
    first.el.classList.add("matched");
    el.classList.add("matched");
    M.sel=null;M.pairs++;S.ok++;playOK();
    $("so").textContent=S.ok;
    if(M.pairs>=M.total){
    const lv=D[LVS[S.l]];const items=lv.filter(it=>it.cn);
    const maxPerRound=10;
    const nextRound=(S.matchRound||0)+1;
    const nextStart=nextRound*maxPerRound;
    if(nextStart<items.length){
      S.matchRound=nextRound;
      setTimeout(showMatchQ,600);
    }else{
      setTimeout(goNext,600);
    }
  }
    return;
  }
  first.el.classList.add("wrong-flash");
  el.classList.add("wrong-flash");
  S.err++;playErr();
  // Determine EN/CN for wrong list
  var enText = first.pair==="en"?first.el.textContent:el.textContent;
  var cnText = first.pair==="cn"?first.el.textContent:el.textContent;
  S.wrongList.push({en:enText,cn:cnText});
  M.sel=null;
  $("se").textContent=S.err;
  setTimeout(()=>{
    document.querySelectorAll(".wrong-flash").forEach(function(e){
      e.classList.remove("wrong-flash");
      e.classList.remove("selected");
    });
  },500);
}

function goNext(){S.q++;showRes();}

function sha(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function nQ(){S.q++;showQ();}

function sh(){
  const lv=D[LVS[S.l]];const items=lv.filter(it=>it.cn);
  const qi=S.ord[S.q];const it=items[qi];const mode=MODES[S.m];
  $("ht").textContent="英文："+it.en;
  $("ht").style.display="block";$("hb").textContent="已提示 ✓";
  try{playAudio(it.en)}catch(e){}
}

function playOK(){
  try{const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator();const g=a.createGain();o.type="sine";o.frequency.value=880;g.gain.setValueAtTime(.25,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.35);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+.35)}catch(e){}
}
function playErr(){
  try{const a=new(window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator();const g=a.createGain();o.type="sawtooth";o.frequency.value=220;g.gain.setValueAtTime(.2,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.25);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+.25)}catch(e){}
}

function showRes(){
  stopTimer();
  const lv=D[LVS[S.l]];const items=lv.filter(it=>it.cn);
  const tot=items.length;const acc=tot>0?Math.round(S.ok/tot*100):0;
  const stars=acc>=80?"★★★":acc>=60?"★★":"★";
  const msgs=["继续加油！","做得不错！","太棒了！"];
  $("rt").textContent=acc>=80?msgs[2]:acc>=60?msgs[1]:msgs[0];
  $("rs").textContent=stars;$("rsc").textContent=S.ok+"/"+tot+" 正确";
  const elapsedMs=S.elapsed?S.elapsed*1000:0;
  $("rac").textContent="正确率 "+acc+"%  · 用时 "+fmtTime(elapsedMs);
  const prog=JSON.parse(localStorage.getItem("vp")||"{}");
  if(!prog[S.l]||prog[S.l]<S.ok)prog[S.l]=S.ok;
  localStorage.setItem("vp",JSON.stringify(prog));
  if(S.elapsed>0){
    const pbKey="pb_"+S.l+"_"+S.m;
    const prev=parseInt(localStorage.getItem(pbKey)||"0");
    if(prev===0||S.elapsed<prev)localStorage.setItem(pbKey,S.elapsed);
    const pbt=parseInt(localStorage.getItem(pbKey)||"0");
    if(pbt>0)$("pbBadge").textContent="PB: "+fmtTime(pbt*1000);
  }
  let wh="";
  if(S.wrongList.length>0){
    wh='<div style="margin-top:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="color:#f87171;font-size:.9em">❌ 错误单词列表：</span><button onclick="copyWL()" style="background:#252545;border:1px solid #3a3a5a;color:#94a3b8;padding:4px 14px;border-radius:6px;font-size:.82em;cursor:pointer">📋 复制</button></div>';
    wh+='<div style="max-height:200px;overflow-y:auto;background:#252545;border-radius:8px;padding:12px;text-align:left">';
    S.wrongList.forEach(it=>{wh+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #3a3a5a;font-size:.85em"><span style="color:#e2e8f0">'+esc(it.en)+'</span><span style="color:#94a3b8">'+esc(it.cn)+'</span></div>'});
    wh+='</div></div>';
  }
  $("rmg").innerHTML=wh;$("ov").classList.add("show");
}
function retry(){$("ov").classList.remove("show");$("pbBadge").textContent="";$("timerDisplay").textContent="0:00";S.matchRound=0;startL(S.l);}
function copyWL(){
  const t=S.wrongList.map(it=>it.en+" - "+it.cn).join("\n");
  navigator.clipboard.writeText(t).then(()=>{const b=document.querySelector("#rmg button");b.textContent="✅ 已复制";setTimeout(()=>{b.textContent="📋 复制"},1500)}).catch(()=>{const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);const b=document.querySelector("#rmg button");b.textContent="✅ 已复制";setTimeout(()=>{b.textContent="📋 复制"},1500)});
}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

// ====== Click word to pronounce ======
// Handled by $("qw").onclick in showQ()
// ====== Init ======
renderLv();

</script>
