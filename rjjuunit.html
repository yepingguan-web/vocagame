<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📚 人教版词汇闯关</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#0f0f23;color:#e0e0e0;min-height:100vh;padding:16px}
.C{max-width:800px;margin:0 auto}
h1{text-align:center;font-size:1.5em;margin:16px 0 4px;color:#7dd3fc}
.sub{text-align:center;color:#64748b;font-size:.85em;margin-bottom:16px}

/* 年级/单元卡片 */
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.gcard{background:#1a1a2e;border:2px solid #3a3a5a;border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all .2s}
.gcard:hover{border-color:#7dd3fc;transform:translateY(-2px)}
.gcard .icon{font-size:2em;margin-bottom:8px}
.gcard .name{font-size:1em;font-weight:600;color:#e2e8f0}
.gcard .cnt{font-size:.8em;color:#64748b;margin-top:4px}

.ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:20px}
.ucard{background:#1a1a2e;border:2px solid #3a3a5a;border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .2s}
.ucard:hover{border-color:#7dd3fc}
.ucard .un{font-size:.9em;font-weight:600;color:#e2e8f0}
.ucard .uc{font-size:.75em;color:#64748b;margin-top:4px}
.ucard .us{margin-top:6px;font-size:.9em}
.ucard.done{border-color:#4ade80}

/* 模式选择 */
.mtabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.mtab{padding:8px 14px;border-radius:8px;border:2px solid #3a3a5a;background:#1a1a2e;color:#94a3b8;cursor:pointer;font-size:.85em;transition:all .2s}
.mtab.on{border-color:#7dd3fc;color:#7dd3fc;background:#1a2a3a}

/* 通用 */
.card{background:#1a1a2e;border:1px solid #3a3a5a;border-radius:12px;padding:20px;margin-bottom:16px}
.btn{padding:10px 20px;border-radius:8px;border:none;background:#3b82f6;color:#fff;cursor:pointer;font-size:.95em;transition:all .2s}
.btn:hover{background:#2563eb}
.bg{background:transparent;border:1px solid #3a3a5a;color:#94a3b8}
.bg:hover{border-color:#7dd3fc;color:#7dd3fc}
.bs{padding:6px 14px;font-size:.82em}
.brow{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;justify-content:center}

/* 题目 */
.qw{font-size:1.6em;font-weight:700;color:#7dd3fc;text-align:center;margin:16px 0;word-break:break-word;min-height:60px;display:flex;align-items:center;justify-content:center}
.qt{text-align:center;color:#64748b;font-size:.85em;margin-bottom:16px}
.ogrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{padding:12px;border-radius:8px;border:2px solid #3a3a5a;background:#252545;color:#e2e8f0;cursor:pointer;font-size:.95em;transition:all .2s;text-align:center;word-break:break-word}
.opt:hover{border-color:#7dd3fc}
.opt.ok{border-color:#4ade80!important;background:#052016!important;color:#4ade80!important}
.opt.no{border-color:#f87171!important;background:#2a0a0a!important;color:#f87171!important}
.opt.sel{border-color:#7dd3fc!important;background:#1a2a3a!important;color:#7dd3fc!important}
.opt.off{pointer-events:none;opacity:.5}

.pbtn{display:block;margin:12px auto;padding:10px 24px;border-radius:8px;border:2px solid #3a3a5a;background:#252545;color:#7dd3fc;cursor:pointer;font-size:1em}
.pbtn:hover{border-color:#7dd3fc}

.pbar{height:6px;background:#252545;border-radius:3px;margin:12px 0;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#3b82f6,#7dd3fc);border-radius:3px;transition:width .3s}
.sts{display:flex;gap:16px;font-size:.85em;color:#64748b;justify-content:center;flex-wrap:wrap}
.sts strong{color:#e2e8f0}

/* 连线配对 */
.marea{display:flex;gap:16px;margin:16px 0;justify-content:center;flex-wrap:wrap}
.mcol{display:flex;flex-direction:column;gap:8px;flex:1;min-width:120px;max-width:280px}
.mcol .opt{width:100%}

/* 结果弹窗 */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.ov.show{display:flex}
.mdl{background:#1a1a2e;border:1px solid #3a3a5a;border-radius:16px;padding:32px;max-width:420px;width:92%;text-align:center}
.mdl h2{font-size:1.3em;color:#e2e8f0;margin-bottom:8px}
.wsec{margin-top:16px;text-align:left}
.wttl{color:#f87171;font-size:.9em;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.wlst{max-height:200px;overflow-y:auto;background:#252545;border-radius:8px;padding:10px}
.wi{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #3a3a5a;font-size:.85em}
.wi span:first-child{color:#e2e8f0}
.wi span:last-child{color:#94a3b8}

.nbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}

@media(max-width:540px){
  .ogrid{grid-template-columns:1fr}
  .ggrid{grid-template-columns:repeat(2,1fr)}
  .ugrid{grid-template-columns:repeat(2,1fr)}
  .marea{flex-direction:column;align-items:center}
  .mcol{max-width:100%}
}
</style>
</head>
<body>
<div class="C" id="app">

  <!-- 年级选择 -->
  <div id="pg1">
    <h1>📚 人教版词汇闯关</h1>
    <p class="sub">初中英语词汇 · 按年级单元学习</p>
    <div class="ggrid" id="gGrid"></div>
  </div>

  <!-- 单元选择 -->
  <div id="pg2" style="display:none">
    <div class="nbar"><button class="btn bg" onclick="goGrade()">← 返回年级</button><span id="gTitle" style="color:#e2e8f0;font-weight:600"></span></div>
    <div class="ugrid" id="uGrid"></div>
  </div>

  <!-- 模式选择 -->
  <div id="pg3" style="display:none">
    <div class="nbar"><button class="btn bg" onclick="goUnit()">← 返回单元</button><span id="uTitle" style="color:#e2e8f0;font-weight:600"></span></div>
    <div class="card">
      <p style="text-align:center;color:#94a3b8;margin-bottom:16px">选择游戏模式</p>
      <div class="mtabs">
        <button class="mtab on" id="m0" onclick="setM(0)">看中文选英文</button>
        <button class="mtab" id="m1" onclick="setM(1)">看英文选中文</button>
        <button class="mtab" id="m2" onclick="setM(2)">听音选中文</button>
        <button class="mtab" id="m3" onclick="setM(3)">🔗 连线配对</button>
      </div>
      <div class="brow" style="margin-top:20px">
        <button class="btn" onclick="go()" style="padding:12px 40px;font-size:1.05em">开始闯关 🚀</button>
      </div>
    </div>
  </div>

  <!-- 游戏区 -->
  <div id="pg4" style="display:none">
    <div class="nbar">
      <button class="btn bg" onclick="quit()">退出</button>
      <span id="gInfo" style="color:#64748b;font-size:.85em"></span>
    </div>
    <div class="card" id="gc"></div>
  </div>

  <!-- 结果弹窗 -->
  <div class="ov" id="ov">
    <div class="mdl">
      <h2 id="rT"></h2>
      <div id="rS" style="font-size:2em;margin:12px 0"></div>
      <p id="rSc"></p>
      <p id="rAc" style="color:#94a3b8;font-size:.95em"></p>
      <div class="wsec" id="wSec" style="display:none">
        <div class="wttl"><span>📝 错题列表</span><button class="btn bg bs" onclick="cpW()">📋 复制</button></div>
        <div class="wlst" id="wLst"></div>
      </div>
      <div class="brow">
        <button class="btn" onclick="retry()">再玩一次</button>
        <button class="btn bg" onclick="goUnit()">返回单元</button>
      </div>
    </div>
  </div>

</div>

  GS.forEach(grade=>{
    const us=Object.keys(WORDS[grade]||{});
    const wc=us.reduce((s,u)=>s+(WORDS[grade][u]||[]).length,0);
    const d=document.createElement('div');d.className='gcard';
    d.innerHTML='<div class="icon">📖</div><div class="name">'+grade+'</div><div class="cnt">'+us.length+'单元 · '+wc+'词</div>';
    d.onclick=()=>{S.grade=grade;goUnit()};
    g.appendChild(d);
  });
}

// ===== 单元页 =====
function goUnit(){
  if(!S.grade){goGrade();return}
  pg(2);$('gTitle').textContent=S.grade;rUnits();
}
function rUnits(){
  const g=$('uGrid');g.innerHTML='';
  const us=WORDS[S.grade]||{};const names=Object.keys(us);
  const pr=JSON.parse(localStorage.getItem('rvp')||'{}');
  names.forEach(un=>{
    const ws=us[un]||[];
    const d=document.createElement('div');d.className='ucard';
    const k=S.grade+'_'+un;const st=pr[k]||0;
    if(st>0)d.classList.add('done');
    d.innerHTML='<div class="un">'+un+'</div><div class="uc">'+ws.length+' 词</div><div class="us">'+'⭐'.repeat(st)+'☆'.repeat(3-st)+'</div>';
    d.onclick=()=>{S.unit=un;S.items=ws;goMode()};
    g.appendChild(d);
  });
}

// ===== 模式页 =====
function goMode(){pg(3);$('uTitle').textContent=S.unit}
function setM(m){S.mode=m;[0,1,2,3].forEach(i=>$('m'+i).className='mtab'+(i===m?' on':''))}

// ===== 开始 =====
function go(){
  if(!S.items||S.items.length<2){alert('词汇不足');return}
  S.ord=shuf([...Array(S.items.length).keys()]);
  S.q=0;S.ok=0;S.err=0;S.ans=false;S.wl=[];
  S.ms={q:0,ok:0,sel:null,items:[],tot:0};
  pg(4);$('gInfo').textContent=S.grade+' · '+S.unit;
  if(S.mode===3)startM();else showQ();
}

// ===== 普通模式 0/1/2 =====
function showQ(){
  const it=S.items[S.ord[S.q]],tot=S.items.length;
  let h='<div class="qw">';
  if(S.mode===0)h+=it.cn;
  else if(S.mode===1)h+=it.en;
  else h+='🔊 听音辨词';
  h+='</div><div class="qt">';
  if(S.mode===0)h+='请选择对应的英文单词';
  else if(S.mode===1)h+='请选择对应的中文释义';
  else h+='请听发音，选择对应的中文释义';
  h+='</div>';
  if(S.mode===2)h+='<button class="pbtn" onclick="playA()">🔊 播放发音</button>';
  h+='<div class="ogrid" id="opts"></div>';
  h+=progH(tot);
  $('gc').innerHTML=h;
  if(S.mode===2)playI(it.en);
  genOpts(it);
}

function genOpts(it){
  const field=S.mode===0?'en':'cn';
  const correct=it[field];
  let pool=S.items.map(x=>x[field]).filter(x=>x!==correct);
  if(pool.length<3){
    const all=[];
    GS.forEach(g=>{Object.values(WORDS[g]||{}).forEach(u=>{u.forEach(x=>all.push(x[field]))})});
    const ex=new Set([correct,...pool]);
    pool=pool.concat(all.filter(x=>!ex.has(x)));
  }
  const others=shuf(pool).slice(0,3);
  shuf([correct,...others]).forEach(opt=>{
    const b=document.createElement('button');b.className='opt';b.textContent=opt;
    b.onclick=()=>chk(b,opt,correct);
    $('opts').appendChild(b);
  });
}

function chk(btn,chosen,correct){
  if(S.ans)return;S.ans=true;
  if(chosen===correct){btn.classList.add('ok');S.ok++}
  else{
    btn.classList.add('no');
    document.querySelectorAll('#opts .opt').forEach(b=>{if(b.textContent===correct)b.classList.add('ok')});
    S.err++;S.wl.push(S.items[S.ord[S.q]]);
  }
  upSt();
  if(S.q+1<S.items.length)setTimeout(()=>{S.q++;S.ans=false;showQ()},600);
  else setTimeout(showR,800);
}

function playA(){playI(S.items[S.ord[S.q]].en)}

// ===== 连线配对模式 =====
function startM(){S.ms={q:0,ok:0,sel:null,items:[],tot:0};nextM()}

function nextM(){
  const remain=S.ord.slice(S.q);
  const n=Math.min(4,remain.length);
  if(n<2){setTimeout(showR,400);return}
  const ms=S.ms;ms.tot=n;ms.sel=null;ms.ok=0;
  ms.items=remain.slice(0,n).map(i=>S.items[i]);

  let h='<div class="qt">🔗 连线配对（'+(S.q+1)+'/'+S.items.length+'）</div>';
  h+='<div style="text-align:center;color:#64748b;margin:8px 0">点选英文再点选对应中文进行配对</div>';
  h+='<div class="marea"><div class="mcol" id="cL"></div><div class="mcol" id="cR"></div></div>';
  h+=progH(S.items.length);
  $('gc').innerHTML=h;

  // 英文列打乱
  const sL=shuf([...Array(n).keys()]);
  // 中文列打乱
  const sR=shuf([...Array(n).keys()]);
  sL.forEach(i=>{
    const b=document.createElement('button');b.className='opt';
    b.textContent=ms.items[i].en;b.dataset.i=i;b.dataset.s='L';
    b.onclick=()=>mClick(b);$('cL').appendChild(b);
  });
  sR.forEach(i=>{
    const b=document.createElement('button');b.className='opt';
    b.textContent=ms.items[i].cn;b.dataset.i=i;b.dataset.s='R';
    b.onclick=()=>mClick(b);$('cR').appendChild(b);
  });
  upSt();
}

function mClick(el){
  if(el.classList.contains('ok'))return;
  const ms=S.ms;
  if(!ms.sel){
    ms.sel=el;el.classList.add('sel');
  }else{
    // 同列切换
    if(ms.sel.dataset.s===el.dataset.s){
      ms.sel.classList.remove('sel');
      ms.sel=el;el.classList.add('sel');
      return;
    }
    el.classList.add('sel');
    const prev=ms.sel;
    // 检查配对：两个按钮的 data-i 相同则匹配
    if(prev.dataset.i===el.dataset.i){
      prev.classList.remove('sel');prev.classList.add('ok');prev.classList.add('off');
      el.classList.remove('sel');el.classList.add('ok');el.classList.add('off');
      ms.ok++;S.ok++;ms.sel=null;
      if(ms.ok>=ms.tot){
        S.q+=ms.tot;
        if(S.q>=S.items.length)setTimeout(showR,600);
        else setTimeout(nextM,700);
      }
    }else{
      S.err++;S.wl.push(ms.items[parseInt(prev.dataset.i)]);
      prev.classList.add('no');el.classList.add('no');
      ms.sel=null;
      setTimeout(()=>{prev.classList.remove('sel','no');el.classList.remove('sel','no')},500);
    }
    upSt();
  }
}

// ===== 公共 =====
function progH(tot){
  return '<div class="pbar"><div class="pfill" id="pF"></div></div><div class="sts"><span>进度 <strong id="sQ">0</strong>/<strong id="sT">'+tot+'</strong></span><span>正确 <strong id="sO" style="color:#4ade80">0</strong></span><span>错误 <strong id="sE" style="color:#f87171">0</strong></span></div>';
}

function upSt(){
  const t=S.items.length;
  if($('sQ'))$('sQ').textContent=Math.min(S.q+1,t);
  if($('sT'))$('sT').textContent=t;
  if($('sO'))$('sO').textContent=S.ok;
  if($('sE'))$('sE').textContent=S.err;
  if($('pF'))$('pF').style.width=(S.q/Math.max(t,1)*100)+'%';
}

function showR(){
  const tot=S.items.length;
  const acc=tot>0?Math.round(S.ok/tot*100):0;
  const st=acc>=80?3:acc>=60?2:1;
  const msg={3:'🎉 太棒了！全部通关！',2:'👍 做得不错！继续加油！',1:'💪 继续加油，你可以的！'};
  $('rT').textContent=msg[st];
  $('rS').textContent='⭐'.repeat(st)+'☆'.repeat(3-st);
  $('rSc').textContent=S.ok+' / '+tot+' 正确';
  $('rAc').textContent='正确率 '+acc+'%';
  const k=S.grade+'_'+S.unit;
  const pr=JSON.parse(localStorage.getItem('rvp')||'{}');
  if(!pr[k]||pr[k]<st){pr[k]=st;localStorage.setItem('rvp',JSON.stringify(pr))}
  const ws=$('wSec');
  if(S.wl.length>0){
    ws.style.display='block';
    const wl=$('wLst');wl.innerHTML='';
    S.wl.forEach(it=>{
      const d=document.createElement('div');d.className='wi';
      d.innerHTML='<span>'+it.en+'</span><span>'+it.cn+'</span>';
      wl.appendChild(d);
    });
  }else ws.style.display='none';
  $('ov').classList.add('show');
}

function retry(){$('ov').classList.remove('show');go()}
function cpW(){cpT(S.wl.map(it=>it.en+' - '+it.cn).join('\n'))}

function playI(w){
  try{const a=new Audio('https://dict.youdao.com/dictvoice?audio='+encodeURIComponent(w)+'&type=2');a.play().catch(()=>spk(w))}catch(e){spk(w)}
}
function spk(w){try{const u=new SpeechSynthesisUtterance(w);u.lang='en-US';window.speechSynthesis.cancel();window.speechSynthesis.speak(u)}catch(e){}}

function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function cpT(t){navigator.clipboard.writeText(t).then(()=>alert('✅ 已复制')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('✅ 已复制')})}
function quit(){if(confirm('确定退出？进度不保存'))goUnit()}

goGrade();
</script>
</body>
</html>
