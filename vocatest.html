<html lang="zh-CN">
<head>

<title>词汇量测试 · 10000词频</title>

body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#0a0a1a;color:#e8e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}
.container{max-width:680px;width:100%}
h1{text-align:center;font-size:1.7em;color:#60a5fa;margin-bottom:4px;letter-spacing:2px}
.subtitle{text-align:center;color:#64748b;font-size:.88em;margin-bottom:20px}
/* Start Screen */
#startScreen{text-align:center;padding:30px 16px}

.info-box b{color:#e2e8f0}
#startBtn{margin-top:20px;padding:14px 44px;font-size:1.15em;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border:none;border-radius:12px;cursor:pointer;font-weight:600;letter-spacing:1px;transition:all .2s}
#startBtn:hover{transform:scale(1.04);box-shadow:0 0 20px rgba(37,99,235,.4)}
/* Quiz */
#quizScreen{display:none}
#progress-bar{width:100%;height:5px;background:#1e293b;border-radius:3px;margin-bottom:12px;overflow:hidden}
#progress-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:3px;transition:width .3s}
#progress-text{text-align:center;color:#64748b;font-size:.82em;margin-bottom:12px}
#question{font-size:1.25em;text-align:center;margin:20px 0;min-height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 8px}
#question .word{color:#93c5fd;font-size:1.4em;font-weight:700;margin-bottom:4px}
#question .hint{color:#475569;font-size:.78em}
#question .cn-word{color:#86efac;font-size:1.3em}
#options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.opt-btn{padding:13px 16px;font-size:1em;background:#111827;border:2px solid #1e293b;border-radius:10px;color:#cbd5e1;cursor:pointer;transition:all .15s;text-align:left;line-height:1.4}
.opt-btn:hover{border-color:#3b82f6;background:#172554}
.opt-btn.correct{border-color:#22c55e!important;background:rgba(34,197,94,.12)!important;color:#4ade80!important}
.opt-btn.wrong{border-color:#ef4444!important;background:rgba(239,68,68,.1)!important;color:#f87171!important}
.opt-btn.show-correct{border-color:#22c55e!important;background:rgba(34,197,94,.08)!important;color:#86efac!important}
.opt-btn.disabled{pointer-events:none;opacity:.55}
.dunno-btn{width:100%;padding:10px 16px;font-size:.95em;background:#1e293b;border:2px solid #334155;border-radius:10px;color:#94a3b8;cursor:pointer;transition:all .15s;margin-top:8px}
.dunno-btn:hover{border-color:#475569;background:#334155}
#controls{display:flex;justify-content:center;gap:12px;margin-top:8px}
#controls button{padding:9px 24px;font-size:.9em;border-radius:8px;border:none;cursor:pointer;font-weight:600}
#stopBtn{background:#1e293b;color:#64748b}
#stopBtn:hover{background:#334155}
#nextBtn{background:#3b82f6;color:#fff;display:none}
#nextBtn:hover{background:#2563eb}
/* Result */
#resultScreen{display:none;text-align:center;padding:30px 16px}
.result-card{background:#111827;border:1px solid #1e293b;border-radius:16px;padding:30px;margin:20px auto;max-width:440px}
#resultScreen h2{color:#93c5fd;font-size:1.3em;margin-bottom:16px}
#vocabSize{font-size:3.2em;font-weight:800;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:8px 0}
#vocabLevel{font-size:1.1em;color:#86efac;margin:12px 0 20px;line-height:1.6}
#resultDetails{color:#64748b;font-size:.88em;line-height:1.8;margin-bottom:20px}
.restart-btn{padding:12px 36px;font-size:1em;background:transparent;color:#60a5fa;border:2px solid #3b82f6;border-radius:10px;cursor:pointer;font-weight:600}
.restart-btn:hover{background:#172554}

.stats{display:flex;justify-content:center;gap:20px;margin:12px 0}
.stat{text-align:center}
.stat .val{font-size:1.4em;font-weight:700;color:#e2e8f0}
.stat .label{font-size:.72em;color:#64748b}

@media(max-width:480px){
  #options{grid-template-columns:1fr}
  h1{font-size:1.3em}
  #vocabSize{font-size:2.4em}
  .result-card{padding:20px 16px}
}

  #options { min-height: 340px; }
  .dunno-btn:disabled { opacity: 0.35 !important; cursor:default; }

en": "conventionally", "cn": "按照惯例地 照常套地", "pos": "adverb", "freq": 10665}, {"en": "resolutely", "cn": "坚决地 果断地", "pos": "adjective", "freq": 10673}, {"en": "reverently", "cn": "虔诚地", "pos": "adverb", "freq": 10677}, {"en": "abundantly", "cn": "丰富地", "pos": "adverb", "freq": 10713}, {"en": "elaborately", "cn": "精细地 详尽地", "pos": "adverb", "freq": 10725}, {"en": "patently", "cn": "明白地 公然地", "pos": "adverb", "freq": 10749}, {"en": "distinctively", "cn": "特殊地 区别地", "pos": "adverb", "freq": 10855}, {"en": "suitably", "cn": "合适地 适宜地 相称地", "pos": "adverb", "freq": 10912}, {"en": "attentively", "cn": "关⼼地", "pos": "adverb", "freq": 10938}, {"en": "unevenly", "cn": "不平坦地 不均衡地", "pos": "adverb", "freq": 10949}, {"en": "customarily", "cn": "通常", "pos": "adverb", "freq": 10965}, {"en": "laboriously", "cn": "费⼒地 艰难地", "pos": "adverb", "freq": 11008}, {"en": "irregularly", "cn": "不规则地", "pos": "adverb", "freq": 11057}, {"en": "perennially", "cn": "永久地 终年地", "pos": "adverb", "freq": 11059}, {"en": "fittingly", "cn": "适当地", "pos": "adverb", "freq": 11061}, {"en": "ingeniously", "cn": "天才地 独创地", "pos": "adverb", "freq": 11082}, {"en": "counterclockwise", "cn": "逆时针⽅向的 地", "pos": "adjective", "freq": 11083}, {"en": "impartially", "cn": "公平地 ⽆私地", "pos": "adverb", "freq": 11203}, {"en": "outwards", "cn": "向外地", "pos": "adverb", "freq": 11230}, {"en": "southwards", "cn": "往南地 在南⽅", "pos": "adverb", "freq": 11232}];
WORD_DB = WORD_DB_RAW;
// Build POS groups
WORD_DB.forEach(w => {
  if (!posGroups[w.pos]) posGroups[w.pos] = [];
  posGroups[w.pos].push(w);
});
document.getElementById('startBtn').textContent = `开始测试（${WORD_DB.length}词库）`;

function startTest() {
  if (WORD_DB.length < 20) return alert('词库不足');
  testActive = true;
  currentQ = 0;
  correctCount = 0;
  answeredCount = 0;
  questions = generateQuestions();
  if (questions.length === 0) return alert('生成题目失败');
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('quizScreen').style.display = 'block';
  showQuestion();
}

function generateQuestions() {
  const qs = [];
  // 由易到难：词库已按词频排序（低freq=高频词=常见词），直接按顺序选取
  // 从词库中均匀抽取100个位置，按词频递增（难度递增）排列
  const step = Math.floor(WORD_DB.length / TOTAL);
  const indices = [];
  for (let i = 0; i < TOTAL; i++) {
    // 每个区间内随机选一个词，保证均匀覆盖
    const base = i * step;
    const range = Math.min(step, WORD_DB.length - base);
    const idx = base + Math.floor(Math.random() * range);
    indices.push(idx);
  }
  
  for (let i = 0; i < TOTAL; i++) {
    const word = WORD_DB[indices[i]];
    if (!word || !word.cn || word.cn.trim() === '') continue;
    
    const type = Math.random() < 0.5 ? 'cn-en' : 'en-cn';
    const distractors = getDistractors(word);
    if (distractors.length < 3) continue;
    
    // Filter distractors: for cn-en, need English text; for en-cn, need Chinese text
    let validDist;
    if (type === 'cn-en') {
      validDist = distractors.filter(d => d.cn && d.cn.trim());
    } else {
      validDist = distractors.filter(d => d.cn && d.cn.trim());
    }
    if (validDist.length < 3) continue;
    
    const options = [word, ...validDist.slice(0, 3)];
    // Shuffle
    for (let j = options.length - 1; j > 0; j--) {
      const k = Math.floor(Math.random() * (j + 1));
      [options[j], options[k]] = [options[k], options[j]];
    }
    const answerIdx = options.indexOf(word);
    qs.push({ type, word, options, answer: answerIdx });
  }
  return qs;
}

function getDistractors(word) {
  const group = posGroups[word.pos] || [];
  // Get words with same POS, different from this word, and with Chinese translation
  const candidates = group.filter(w => w.en !== word.en && w.cn && w.cn.trim());
  // Shuffle and take first 10 candidates, then pick 3
  const shuffled = candidates.sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 10);
}

function showQuestion() {
  const q = questions[currentQ];
  if (!q) return finishTest();
  
  const pct = (currentQ / questions.length * 100).toFixed(1);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `第 ${currentQ + 1} / ${questions.length} 题`;
  document.getElementById('nextBtn').style.display = 'none';
  
  const qDiv = document.getElementById('question');
  if (q.type === 'cn-en') {
    qDiv.innerHTML = `<div class="cn-word">${q.word.cn}</div><div class="hint">请选择对应的英文单词</div>`;
  } else {
    qDiv.innerHTML = `<div class="word">${q.word.en}</div><div class="hint">请选择对应的中文释义</div>`;
  }
  
  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = q.type === 'cn-en' ? opt.en : opt.cn;
    btn.onclick = () => selectAnswer(i);
    optDiv.appendChild(btn);
  });
  
  // 添加「不知道」按钮（复用或创建）
  let dunnoBtn = optDiv.querySelector('.dunno-btn');
  if (!dunnoBtn) {
    dunnoBtn = document.createElement('button');
    dunnoBtn.className = 'dunno-btn';
    optDiv.appendChild(dunnoBtn);
  }
  dunnoBtn.textContent = '❓ 不知道';
  dunnoBtn.onclick = () => dunno();
  dunnoBtn.disabled = false;
  dunnoBtn.style.opacity = '1';
  dunnoBtn.style.pointerEvents = 'auto';
  dunnoBtn.style.visibility = 'visible';
}

function selectAnswer(idx) {
  const q = questions[currentQ];
  if (!q || idx === undefined) return;
  
  // 隐藏「不知道」按钮
  const dunnoBtn = document.querySelector('.dunno-btn');
  if (dunnoBtn) { dunnoBtn.disabled = true; dunnoBtn.style.opacity = '0.4'; dunnoBtn.style.pointerEvents = 'none'; }
  
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.classList.add('disabled'));
  
  if (idx === q.answer) {
    btns[idx].classList.add('correct');
    correctCount++;
  } else {
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('show-correct');
  }
  answeredCount++;
  
  // 1.5秒后自动跳到下一题
  setTimeout(() => {
    currentQ++;
    if (currentQ >= questions.length) return finishTest();
    showQuestion();
  }, 0);
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= questions.length) return finishTest();
  showQuestion();
}

function stopTest() {
  if (answeredCount > 3 && confirm('确定终止？将根据已答题数估算词汇量。')) finishTest();
}

function dunno() {
  // 点击「不知道」，直接跳过
  const dunnoBtn = document.querySelector('.dunno-btn');
  if (dunnoBtn) { dunnoBtn.disabled = true; dunnoBtn.style.opacity = '0.4'; dunnoBtn.style.pointerEvents = 'none'; }
  
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.classList.add('disabled'));
  
  skippedCount++;
  answeredCount++;
  
  setTimeout(() => {
    currentQ++;
    if (currentQ >= questions.length) return finishTest();
    showQuestion();
  }, 300);
}

function finishTest() {
  try {
    testActive = false;
    document.getElementById('quizScreen').style.display = 'none';
    const rs = document.getElementById('resultScreen');
    if (!rs) { alert('ERROR: resultScreen 元素不存在！'); return; }
    rs.style.display = 'block';

    const total = answeredCount;
    const accuracy = TOTAL > 0 ? correctCount / TOTAL : 0;
    const raw = Math.pow(accuracy, 1.5) * 15000;
    const vocabSize = Math.round(raw);

    let level;
    if (vocabSize < 2000) { level = '🔴 入门水平 — 建议从基础词汇开始'; }
    else if (vocabSize < 3500) { level = '🟠 基础水平 — 接近初中水平'; }
    else if (vocabSize < 5000) { level = '🟡 中考水平 — 接近高考要求'; }
    else if (vocabSize < 6500) { level = '🟢 高考水平 — 词汇量达标'; }
    else if (vocabSize < 8000) { level = '🔵 四六级水平 — 词汇量良好'; }
    else if (vocabSize < 12000) { level = '🟣 考研/雅思水平 — 词汇量优秀'; }
    else { level = '🏆 高级水平 — 词汇量非常出色！'; }

    document.getElementById('vocabSize').textContent = '≈ ' + vocabSize.toLocaleString() + ' 词';
    document.getElementById('vocabLevel').textContent = level;
    document.getElementById('resultStats').innerHTML = `
      <div class="stat"><div class="val">${total}</div><div class="label">答题数</div></div>
      <div class="stat"><div class="val">${correctCount}</div><div class="label">答对</div></div>
      <div class="stat"><div class="val">${(accuracy*100).toFixed(0)}%</div><div class="label">正确率</div></div>
    `;
    document.getElementById('resultDetails').textContent = '估算基于词频分布模型，仅供参考';
    console.log('finishTest 完成: vocabSize=' + vocabSize);
  } catch(e) {
    alert('finishTest 报错: ' + e.message);
  }
}

function restartTest() {
  document.getElementById('resultScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'block';
}
