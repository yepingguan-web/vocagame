<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语不规则动词检测 — 规律版 & 乱序版</title>
<style>
:root{--primary:#4f46e5;--primary-light:#eef2ff;--bg:#f1f5f9;--card:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--green:#16a34a;--red:#dc2626;--amber:#d97706}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.header{background:linear-gradient(135deg,#1e1b4b,#312e81,#4338ca);color:#fff;padding:28px 20px 20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.header h1{font-size:26px;margin-bottom:4px}
.header .sub{font-size:13px;opacity:.8}
.tabs{display:flex;justify-content:center;gap:4px;padding:16px 20px 0;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:100px;z-index:99}
.tab-btn{padding:10px 28px;border:none;border-radius:10px 10px 0 0;cursor:pointer;font-size:15px;font-weight:600;background:transparent;color:var(--muted);transition:all .2s}
.tab-btn:hover{color:var(--primary);background:var(--primary-light)}
.tab-btn.active{color:var(--primary);background:var(--primary-light);border-bottom:3px solid var(--primary)}
.container{max-width:1300px;margin:0 auto;padding:20px}
.toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px;align-items:center}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:10px 16px 10px 40px;border:2px solid var(--border);border-radius:24px;font-size:14px;outline:none;transition:border .2s;background:#fff}
.search-box input:focus{border-color:var(--primary)}
.search-box .s-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#999}
.toolbar .btn{padding:10px 20px;border:2px solid var(--border);border-radius:24px;cursor:pointer;font-size:14px;font-weight:500;background:#fff;transition:all .2s;white-space:nowrap}
.toolbar .btn:hover{border-color:var(--primary);color:var(--primary)}
.toolbar .btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.toolbar .btn-quiz{padding:10px 20px;background:var(--green);color:#fff;border:none;border-radius:24px;cursor:pointer;font-size:14px;font-weight:600;white-space:nowrap;transition:opacity .2s}
.toolbar .btn-quiz:hover{opacity:.85}
.count-info{font-size:13px;color:var(--muted);margin-left:auto}
.cat-section{margin-bottom:24px;background:var(--card);border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.cat-header{padding:14px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;border-bottom:1px solid var(--border);user-select:none;transition:background .15s}
.cat-header:hover{background:#f8fafc}
.cat-header .arrow{transition:transform .25s;font-size:12px}
.cat-header.collapsed .arrow{transform:rotate(-90deg)}
.cat-badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;color:#fff}
.badge-aaa{background:#16a34a}
.badge-abb{background:#2563eb}
.badge-aba{background:#d97706}
.badge-abc{background:#dc2626}
.cat-body{overflow:hidden;transition:max-height .35s}
.cat-body.hidden{max-height:0!important}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{background:#f8fafc;padding:10px 12px;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:2px solid var(--border);position:sticky;top:0;white-space:nowrap}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
tbody tr:hover{background:#f8fafc}
td.ipa{color:var(--muted);font-size:12px}
td.meaning{min-width:120px;white-space:normal}
.verb-base{font-weight:700;color:var(--primary)}
.speakable{cursor:pointer;transition:all .15s;border-radius:4px;padding:2px 4px;margin:-2px -4px}
.speakable:hover{background:#eef2ff;color:var(--primary)}
.speakable:active{background:#dde4ff}
.speak-icon{font-size:11px;opacity:.4;margin-left:2px;transition:opacity .15s}
.speakable:hover .speak-icon{opacity:1}
.blur-cell{filter:blur(5px);cursor:pointer;transition:filter .2s;user-select:none}
.blur-cell:hover{filter:blur(2px)}
.blur-cell.revealed{filter:none;cursor:default}
.col-toggle{font-size:11px;color:var(--muted);cursor:pointer;user-select:none}
.col-toggle:hover{color:var(--primary)}
.btn-copy{padding:4px 12px;background:#f1f5f9;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .15s;margin-left:8px}
.btn-copy:hover{background:#e2e8f0;color:var(--text)}
.btn-copy.copied{background:var(--green);color:#fff;border-color:var(--green)}
.speaking{animation:pulse .3s}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
/* Quiz */
.quiz-area{max-width:700px;margin:0 auto}
.quiz-card{background:var(--card);border-radius:12px;padding:28px;box-shadow:0 4px 16px rgba(0,0,0,.08);text-align:center;margin-bottom:16px}
.quiz-card .hint{font-size:13px;color:var(--muted);margin-bottom:4px}
.quiz-card .base-word{font-size:42px;font-weight:800;color:var(--primary);margin:8px 0}
.quiz-card .meaning-word{font-size:18px;color:var(--text);margin-bottom:12px}
.quiz-card .meaning-cn{font-size:15px;color:var(--muted)}
.quiz-inputs{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:18px}
.quiz-inputs .field{text-align:left}
.quiz-inputs label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px}
.quiz-inputs input{padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:16px;width:180px;outline:none;transition:border .2s}
.quiz-inputs input:focus{border-color:var(--primary)}
.quiz-inputs input.correct{border-color:var(--green);background:#f0fdf4}
.quiz-inputs input.wrong{border-color:var(--red);background:#fef2f2}
.quiz-feedback{margin-top:16px;font-size:15px;min-height:24px}
.quiz-feedback.correct{color:var(--green)}
.quiz-feedback.wrong{color:var(--red)}
.quiz-stats{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.quiz-stat{background:var(--card);border-radius:10px;padding:16px 24px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.quiz-stat .num{font-size:28px;font-weight:700}
.quiz-stat .lbl{font-size:12px;color:var(--muted)}
.quiz-stat .num.ok{color:var(--green)}
.quiz-stat .num.bad{color:var(--red)}
/* Mobile */
@media(max-width:768px){
.header h1{font-size:20px}
.tabs{top:80px}
.tab-btn{padding:8px 16px;font-size:13px}
.cat-header{font-size:14px}
table{font-size:12px}
tbody td{padding:8px 6px}
.quiz-card .base-word{font-size:32px}
.quiz-inputs input{width:140px;font-size:14px}
}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header">
<h1>📖 英语不规则动词检测</h1>
<div class="sub">规律版 · 乱序版 · 测验模式 | 含音标 & 中文释义</div>
</div>

<div class="tabs" id="tabBar">
<button class="tab-btn active" data-tab="pattern">📂 规律版</button>
<button class="tab-btn" data-tab="shuffle">🔀 乱序版</button>
<button class="tab-btn" data-tab="quiz">✏️ 测验模式</button>
</div>

<div class="container">

<!-- Toolbar -->
<div class="toolbar" id="toolbar">
<div class="search-box">
<span class="s-icon">🔍</span>
<input type="text" id="searchInput" placeholder="搜索动词原形、过去式、中文释义…">
</div>
<button class="btn active" id="btnShowAll" onclick="toggleBlur(false)">👁️ 全部显示</button>
<button class="btn" id="btnBlurPast" onclick="toggleBlur('past')">🙈 隐藏过去式</button>
<button class="btn" id="btnBlurPP" onclick="toggleBlur('pp')">🙈 隐藏过去分词</button>
<button class="btn" id="btnBlurBoth" onclick="toggleBlur('both')">🙈 全部隐藏</button>
<button class="btn-quiz" onclick="switchToQuiz()">✏️ 开始测验</button>
<span class="count-info" id="countInfo"></span>
</div>

<!-- Pattern View -->
<div id="viewPattern"></div>

<!-- Shuffle View -->
<div id="viewShuffle" style="display:none"></div>

<!-- Quiz View -->
<div id="viewQuiz" style="display:none"></div>

</div>

<div class="toast" id="toast"></div>

// ==================== CATEGORY DEFINITIONS ====================
const CATEGORIES = [
  {id:'AAA',label:'AAA型',desc:'原形 = 过去式 = 过去分词',badge:'badge-aaa',verbs:VERB_DATA.filter(v=>v.cat==='AAA')},
  {id:'ABB',label:'ABB型',desc:'过去式 = 过去分词',badge:'badge-abb',verbs:VERB_DATA.filter(v=>v.cat==='ABB')},
  {id:'ABA',label:'ABA型',desc:'原形 = 过去分词',badge:'badge-aba',verbs:VERB_DATA.filter(v=>v.cat==='ABA')},
  {id:'ABC',label:'ABC型',desc:'原形 ≠ 过去式 ≠ 过去分词',badge:'badge-abc',verbs:VERB_DATA.filter(v=>v.cat==='ABC')}
];

// ==================== STATE ====================
let currentTab = 'pattern';
let blurMode = 'none'; // 'none' | 'past' | 'pp' | 'both'
let searchQuery = '';
let collapsedCats = {};
let shuffleOrder = [];

// ==================== INIT ====================
function init(){
  setupTabs();
  renderCurrentView();
  updateCount();
}

function setupTabs(){
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',function(){
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      currentTab = this.dataset.tab;
      document.getElementById('viewPattern').style.display = currentTab==='pattern'?'':'none';
      document.getElementById('viewShuffle').style.display = currentTab==='shuffle'?'':'none';
      document.getElementById('viewQuiz').style.display = currentTab==='quiz'?'':'none';
      document.getElementById('toolbar').style.display = currentTab==='quiz'?'none':'';
      if(currentTab==='quiz') startQuiz();
      else renderCurrentView();
    });
  });
  document.getElementById('searchInput').addEventListener('input',function(){
    searchQuery = this.value.trim().toLowerCase();
    renderCurrentView();
  });
}

// ==================== RENDER: PATTERN VIEW ====================
function renderPatternView(){
  const container = document.getElementById('viewPattern');
  let html = '';
  CATEGORIES.forEach(cat=>{
    let verbs = cat.verbs;
    if(searchQuery) verbs = verbs.filter(v=>matchVerb(v));
    if(verbs.length===0) return;
    const isCollapsed = collapsedCats[cat.id] || false;
    const maxH = isCollapsed ? 0 : (verbs.length * 46 + 60) + 'px';
    html += `<div class="cat-section">
      <div class="cat-header${isCollapsed?' collapsed':''}" onclick="toggleCat('${cat.id}')" data-cat="${cat.id}">
        <span class="arrow">▼</span>
        <span class="cat-badge ${cat.badge}">${cat.label}</span>
        <span>${cat.desc}</span>
        <span style="color:var(--muted);font-weight:400;margin-left:auto">${verbs.length}个动词</span>
      </div>
      <div class="cat-body${isCollapsed?' hidden':''}" style="max-height:${maxH}" data-cat-body="${cat.id}">
        <div class="table-wrap">
          <table><thead><tr>
            <th>动词原形</th><th>音标</th>
            <th class="col-toggle" data-col="past">过去式</th><th>音标</th>
            <th class="col-toggle" data-col="pp">过去分词</th><th>音标</th>
            <th>现在分词</th><th>中文释义</th>
          </tr></thead><tbody>`;
    verbs.forEach(v=>{
      html += `<tr>
        <td class="verb-base speakable" onclick="speakWord('${escAttr(v.base)}',this)">${v.base}<span class="speak-icon">🔊</span></td>
        <td class="ipa">${v.ipaBase||''}</td>
        <td class="blur-cell${blurMode==='past'||blurMode==='both'?'':' revealed'}" data-col="past" onclick="revealCell(this);event.stopPropagation();speakWord('${escAttr(v.past.split('/')[0].trim())}')">${v.past}</td>
        <td class="ipa">${v.ipaPast||''}</td>
        <td class="blur-cell${blurMode==='pp'||blurMode==='both'?'':' revealed'}" data-col="pp" onclick="revealCell(this);event.stopPropagation();speakWord('${escAttr(v.pp.split('/')[0].trim())}')">${v.pp}</td>
        <td class="ipa">${v.ipaPP||''}</td>
        <td class="speakable" onclick="speakWord('${escAttr(v.ing)}',this)">${v.ing}<span class="speak-icon">🔊</span></td>
        <td class="meaning">${v.meaning}</td>
      </tr>`;
    });
    html += '</tbody></table></div></div></div>';
  });
  container.innerHTML = html || '<div class="empty-state">🔍 没有匹配的动词</div>';
}

// ==================== RENDER: SHUFFLE VIEW ====================
function renderShuffleView(){
  const container = document.getElementById('viewShuffle');
  let verbs = [...VERB_DATA];
  if(searchQuery) verbs = verbs.filter(v=>matchVerb(v));
  if(shuffleOrder.length !== verbs.length || !shuffleOrder.length){
    shuffleOrder = verbs.map((_,i)=>i);
    // Fisher-Yates
    for(let i=shuffleOrder.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffleOrder[i],shuffleOrder[j]]=[shuffleOrder[j],shuffleOrder[i]];}
  }
  const ordered = shuffleOrder.map(i=>verbs[i]).filter(Boolean);
  if(ordered.length===0){container.innerHTML='<div class="empty-state">🔀 没有匹配的动词，<a href="#" onclick="reshuffle()">点击随机排序</a></div>';return;}

  container.innerHTML = `<div style="margin-bottom:12px"><button class="btn" onclick="reshuffle()">🎲 重新随机排序</button></div>
    <div class="table-wrap"><table><thead><tr>
      <th>#</th><th>动词原形</th><th>音标</th>
      <th class="col-toggle" data-col="past">过去式</th><th>音标</th>
      <th class="col-toggle" data-col="pp">过去分词</th><th>音标</th>
      <th>现在分词</th><th>中文释义</th><th>类型</th>
    </tr></thead><tbody>
    ${ordered.map((v,i)=>`<tr>
      <td style="color:var(--muted)">${i+1}</td>
      <td class="verb-base speakable" onclick="speakWord('${escAttr(v.base)}',this)">${v.base}<span class="speak-icon">🔊</span></td>
      <td class="ipa">${v.ipaBase||''}</td>
      <td class="blur-cell${blurMode==='past'||blurMode==='both'?'':' revealed'}" data-col="past" onclick="revealCell(this);event.stopPropagation();speakWord('${escAttr(v.past.split('/')[0].trim())}')">${v.past}</td>
      <td class="ipa">${v.ipaPast||''}</td>
      <td class="blur-cell${blurMode==='pp'||blurMode==='both'?'':' revealed'}" data-col="pp" onclick="revealCell(this);event.stopPropagation();speakWord('${escAttr(v.pp.split('/')[0].trim())}')">${v.pp}</td>
      <td class="ipa">${v.ipaPP||''}</td>
      <td class="speakable" onclick="speakWord('${escAttr(v.ing)}',this)">${v.ing}<span class="speak-icon">🔊</span></td>
      <td class="meaning">${v.meaning}</td>
      <td><span class="cat-badge badge-${v.cat.toLowerCase()}">${v.cat}</span></td>
    </tr>`).join('')}
    </tbody></table></div>`;
}

// ==================== QUIZ ====================
let quizVerbs = [], quizIndex = 0, quizCorrect = 0, quizWrong = 0, quizTotal = 0;
let wrongList = []; // {base, past, pp, meaning, userPast, userPP}

function startQuiz(){
  // Deduplicate by base+past+pp for quiz mode
  const seen = new Set();
  quizVerbs = VERB_DATA.filter(v=>{
    const key = v.base+'|'+v.past+'|'+v.pp;
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  }).sort(()=>Math.random()-.5);
  quizIndex = 0; quizCorrect = 0; quizWrong = 0; quizTotal = 0;
  wrongList = [];
  renderQuizCard();
  updateQuizStats();
}
function renderQuizCard(){
  stopSpeech();
  if(quizIndex >= quizVerbs.length){
    const pct = quizTotal>0 ? Math.round(quizCorrect/quizTotal*100) : 0;
    let wrongHTML = '';
    if(wrongList.length > 0){
      wrongHTML = `
        <div style="margin-top:16px;text-align:left;max-width:600px;margin-left:auto;margin-right:auto">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span style="font-weight:700;font-size:15px">❌ 错题汇总 (${wrongList.length}题)</span>
            <button class="btn-copy" onclick="copyWrongList(this)" style="font-size:13px;padding:6px 16px">📋 一键复制全部错题</button>
          </div>
          <div style="overflow-x:auto"><table style="width:100%;font-size:13px;border-collapse:collapse">
            <thead><tr style="background:#fef2f2">
              <th style="padding:8px;text-align:left;border-bottom:2px solid #fecaca">#</th>
              <th style="padding:8px;text-align:left;border-bottom:2px solid #fecaca">原形</th>
              <th style="padding:8px;text-align:left;border-bottom:2px solid #fecaca">正确过去式</th>
              <th style="padding:8px;text-align:left;border-bottom:2px solid #fecaca">正确过去分词</th>
              <th style="padding:8px;text-align:left;border-bottom:2px solid #fecaca">你的答案</th>
              <th style="padding:8px;text-align:left;border-bottom:2px solid #fecaca">释义</th>
            </tr></thead><tbody>
            ${wrongList.map((w,i)=>`<tr style="border-bottom:1px solid #fee2e2">
              <td style="padding:6px 8px;color:var(--muted)">${i+1}</td>
              <td style="padding:6px 8px;font-weight:700">${w.base}</td>
              <td style="padding:6px 8px;color:var(--green)">${w.past}</td>
              <td style="padding:6px 8px;color:var(--green)">${w.pp}</td>
              <td style="padding:6px 8px;color:var(--red);font-size:12px">${w.userPast||'-'} / ${w.userPP||'-'}</td>
              <td style="padding:6px 8px">${w.meaning}</td>
            </tr>`).join('')}
          </tbody></table></div>
        </div>`;
    }
    document.getElementById('viewQuiz').innerHTML = `
      <div class="quiz-card">
        <div style="font-size:48px;margin-bottom:12px">${pct>=80?'🎉':pct>=60?'📚':'💪'}</div>
        <div style="font-size:24px;font-weight:700">测验${quizTotal===quizVerbs.length?'完成':'结束'}！</div>
        <div style="margin-top:12px;color:var(--muted)">正确 ${quizCorrect} / ${quizTotal}（共${quizVerbs.length}题${quizTotal<quizVerbs.length?'，已做'+quizTotal+'题':''}）</div>
        <div style="font-size:48px;font-weight:800;color:${pct>=80?'var(--green)':pct>=60?'var(--amber)':'var(--red)'};margin:8px 0">${pct}%</div>
        ${wrongList.length===0&&quizTotal>0?'<div style="color:var(--green);font-size:16px">🌟 全部正确，太棒了！</div>':''}
        <button class="btn-quiz" style="margin-top:12px" onclick="startQuiz()">🔄 再来一轮</button>
      </div>
      ${wrongHTML}
      <div class="quiz-stats" style="margin-top:16px">
        <div class="quiz-stat"><div class="num" id="qTotal">0</div><div class="lbl">总题数</div></div>
        <div class="quiz-stat"><div class="num ok" id="qOk">0</div><div class="lbl">✅ 正确</div></div>
        <div class="quiz-stat"><div class="num bad" id="qBad">0</div><div class="lbl">❌ 错误</div></div>
        <div class="quiz-stat"><div class="num" id="qPct">-</div><div class="lbl">正确率</div></div>
      </div>`;
    updateQuizStats();
    return;
  }
  const v = quizVerbs[quizIndex];
  document.getElementById('viewQuiz').innerHTML = `
    <div class="quiz-area">
      <div class="quiz-card">
        <div class="hint">第 ${quizIndex+1} / ${quizVerbs.length} 题 ｜ 类型：${v.cat}型</div>
        <div class="base-word speakable" onclick="speakWord('${escAttr(v.base)}',this)" style="cursor:pointer">${v.base}<span class="speak-icon" style="font-size:18px">🔊</span></div>
        <div class="meaning-word">/${v.ipaBase||''}/</div>
        <div class="meaning-cn">${v.meaning}</div>
        <div class="quiz-inputs">
          <div class="field"><label>过去式 (Past)</label><input type="text" id="quizPast" placeholder="输入过去式…" autocomplete="off"></div>
          <div class="field"><label>过去分词 (P.P.)</label><input type="text" id="quizPP" placeholder="输入过去分词…" autocomplete="off"></div>
        </div>
        <div class="quiz-feedback" id="quizFeedback"></div>
        <div id="quizActions" style="margin-top:12px">
          <button class="btn-quiz" id="btnCheck" onclick="checkQuiz()">✅ 检查</button>
          <button class="btn" style="margin-left:8px;display:none" id="btnNext" onclick="nextQuiz()">→ 下一题</button>
          <button class="btn" style="margin-left:8px;display:none" id="btnSpeak" onclick="speakAnswer()">🔊 朗读答案</button>
          <button class="btn" style="margin-left:8px" id="btnStop" onclick="stopQuiz()">⏹ 结束测验</button>
        </div>
      </div>
      <div class="quiz-stats">
        <div class="quiz-stat"><div class="num" id="qTotal">0</div><div class="lbl">总题数</div></div>
        <div class="quiz-stat"><div class="num ok" id="qOk">0</div><div class="lbl">✅ 正确</div></div>
        <div class="quiz-stat"><div class="num bad" id="qBad">0</div><div class="lbl">❌ 错误</div></div>
        <div class="quiz-stat"><div class="num" id="qPct">-</div><div class="lbl">正确率</div></div>
      </div>
    </div>`;
  // Auto-speak the base word
  setTimeout(() => speakWord(v.base), 300);

  const inpP = document.getElementById('quizPast');
  inpP.focus();
  inpP.addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('quizPP').focus();});
  // Auto-speak after typing past tense (when user moves to next field or pauses)
  inpP.addEventListener('blur',function(){if(this.value.trim())speakWord(this.value.trim());});
  document.getElementById('quizPP').addEventListener('keydown',function(e){if(e.key==='Enter')checkQuiz();});
  document.getElementById('quizPP').addEventListener('blur',function(){if(this.value.trim())speakWord(this.value.trim());});
}
function checkQuiz(){
  const v = quizVerbs[quizIndex];
  const inputPast = document.getElementById('quizPast').value.trim().toLowerCase();
  const inputPP = document.getElementById('quizPP').value.trim().toLowerCase();
  const correctPasts = v.past.toLowerCase().split('/').map(s=>s.trim());
  const correctPPs = v.pp.toLowerCase().split('/').map(s=>s.trim());
  const pastOk = correctPasts.some(c=>c&&inputPast===c);
  const ppOk = correctPPs.some(c=>c&&inputPP===c);
  const fb = document.getElementById('quizFeedback');
  const inpP = document.getElementById('quizPast');
  const inpPP = document.getElementById('quizPP');

  if(!inputPast && !inputPP){fb.textContent='请输入至少一个答案';fb.className='quiz-feedback wrong';return;}

  // Require both fields for a complete answer
  if(!inputPast || !inputPP){
    if(inputPast && !inputPP){inpP.className=pastOk?'correct':'wrong';fb.textContent='请输入过去分词';fb.className='quiz-feedback';return;}
    if(!inputPast && inputPP){inpPP.className=ppOk?'correct':'wrong';fb.textContent='请输入过去式';fb.className='quiz-feedback';return;}
  }

  inpP.className = pastOk ? 'correct' : 'wrong';
  inpPP.className = ppOk ? 'correct' : 'wrong';
  quizTotal++;

  if(pastOk && ppOk){
    // CORRECT → auto-advance
    quizCorrect++;
    fb.textContent='✅ 完全正确！自动跳转下一题…';
    fb.className='quiz-feedback correct';
    document.getElementById('btnCheck').style.display='none';
    document.getElementById('btnStop').style.display='none';
    document.getElementById('quizPast').disabled=true;
    document.getElementById('quizPP').disabled=true;
    // Speak the correct answer
    speakWord(v.base + '. ' + v.past + '. ' + v.pp);
    updateQuizStats();
    setTimeout(() => { quizIndex++; if(quizIndex < quizVerbs.length) renderQuizCard(); else { quizIndex = quizVerbs.length; renderQuizCard(); }}, 1200);
    return;
  }

  // WRONG or PARTIAL → track in wrongList (no per-question copy)
  quizWrong++;
  wrongList.push({
    base: v.base,
    past: v.past,
    pp: v.pp,
    meaning: v.meaning,
    userPast: document.getElementById('quizPast').value.trim(),
    userPP: document.getElementById('quizPP').value.trim()
  });

  if(!pastOk && !ppOk){
    fb.innerHTML=`❌ 正确答案：<b>过去式</b> = ${v.past}，<b>过去分词</b> = ${v.pp}`;
    fb.className='quiz-feedback wrong';
  } else {
    fb.innerHTML=`⚠️ 部分正确！<b>过去式</b> = ${v.past}，<b>过去分词</b> = ${v.pp}`;
    fb.className='quiz-feedback wrong';
  }

  // Speak the correct answer
  speakWord(v.base + '. Past: ' + v.past + '. Past participle: ' + v.pp);

  document.getElementById('btnCheck').style.display='none';
  document.getElementById('btnStop').style.display='none';
  document.getElementById('btnNext').style.display='inline-block';
  document.getElementById('btnSpeak').style.display='inline-block';
  document.getElementById('quizPast').disabled=true;
  document.getElementById('quizPP').disabled=true;

  updateQuizStats();
}

function speakAnswer(){
  const v = quizVerbs[quizIndex];
  speakWord(v.base + '. Past: ' + v.past + '. Past participle: ' + v.pp);
}

function nextQuiz(){
  stopSpeech();
  quizIndex++;
  renderQuizCard();
}

function stopQuiz(){
  stopSpeech();
  // Jump to end to show wrong answer summary
  quizIndex = quizVerbs.length;
  renderQuizCard();
}

function copyWrongList(btn){
  let text = '';
  wrongList.forEach((w,i)=>{
    text += `${i+1}. ${w.base} → 过去式: ${w.past}  过去分词: ${w.pp}  (${w.meaning})\n`;
    text += `   你的答案: ${w.userPast||'未填'} / ${w.userPP||'未填'}\n`;
  });
  text += `\n共 ${wrongList.length} 道错题 | 正确率 ${Math.round(quizCorrect/quizTotal*100)}%`;
  copyText(text, btn);
}

function updateQuizStats(){
  document.getElementById('qTotal').textContent = quizTotal;
  document.getElementById('qOk').textContent = quizCorrect;
  document.getElementById('qBad').textContent = quizWrong;
  document.getElementById('qPct').textContent = quizTotal>0 ? Math.round(quizCorrect/quizTotal*100)+'%' : '-';
}

// ==================== HELPERS ====================
function renderCurrentView(){
  if(currentTab==='pattern') renderPatternView();
  else if(currentTab==='shuffle') renderShuffleView();
  updateCount();
}
function escAttr(s){return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function matchVerb(v){
  const q = searchQuery;
  return v.base.toLowerCase().includes(q) || v.past.toLowerCase().includes(q) || v.pp.toLowerCase().includes(q) || v.meaning.includes(q) || v.ing.toLowerCase().includes(q);
}
function updateCount(){
  let verbs = currentTab==='pattern' ? [...VERB_DATA] : [...VERB_DATA];
  if(searchQuery) verbs = verbs.filter(v=>matchVerb(v));
  document.getElementById('countInfo').textContent = `共 ${verbs.length} 个动词`;
}
function toggleCat(id){
  collapsedCats[id] = !collapsedCats[id];
  const header = document.querySelector(`.cat-header[data-cat="${id}"]`);
  const body = document.querySelector(`.cat-body[data-cat-body="${id}"]`);
  if(header) header.classList.toggle('collapsed',collapsedCats[id]);
  if(body){
    body.classList.toggle('hidden',collapsedCats[id]);
    if(!collapsedCats[id]) body.style.maxHeight = (body.querySelectorAll('tbody tr').length * 46 + 60) + 'px';
    else body.style.maxHeight = '0';
  }
}
function toggleBlur(mode){
  blurMode = blurMode===mode ? 'none' : mode;
  document.querySelectorAll('#btnShowAll,#btnBlurPast,#btnBlurPP,#btnBlurBoth').forEach(b=>b.classList.remove('active'));
  if(blurMode==='past') document.getElementById('btnBlurPast').classList.add('active');
  else if(blurMode==='pp') document.getElementById('btnBlurPP').classList.add('active');
  else if(blurMode==='both') document.getElementById('btnBlurBoth').classList.add('active');
  else document.getElementById('btnShowAll').classList.add('active');
  renderCurrentView();
}
function revealCell(td){td.classList.add('revealed');}
function reshuffle(){
  shuffleOrder = [];
  renderShuffleView();
}

// ==================== SPEECH (优质浏览器语音) ====================
let speechSynth = window.speechSynthesis;
let premiumVoice = null;
let speakingEl = null;

function initVoice() {
  if (!speechSynth) return;
  // Try to find a premium voice; voices may load async
  const voices = speechSynth.getVoices();
  const preferred = ['Google US English','Google 英语（美国）','Samantha','Alex','Microsoft David','Microsoft Zira','Karen','Daniel','Moira','Fiona'];
  for (const p of preferred) {
    const v = voices.find(v=>v.name.includes(p)&&v.lang.startsWith('en'));
    if (v) { premiumVoice = v; return; }
  }
  // Fallback: any English voice
  premiumVoice = voices.find(v=>v.lang.startsWith('en')) || null;
}
// Load voices now + on change (some browsers load them async)
initVoice();
if (speechSynth) speechSynth.onvoiceschanged = initVoice;

function speakWord(text, el) {
  if (!text || !speechSynth) return;
  const cleanText = text.replace(/[\/\[\]ˈˌɔɛəʌɔ̃ɑɒæʃʒŋθð̃]/g,'').replace(/['']/g,'').trim();
  if (!cleanText) return;
  speechSynth.cancel();
  const u = new SpeechSynthesisUtterance(cleanText);
  u.lang = 'en-US';
  u.rate = 0.9;
  u.pitch = 1;
  if (premiumVoice) u.voice = premiumVoice;
  if (el) {
    el.classList.add('speaking');
    u.onend = () => el.classList.remove('speaking');
    u.onerror = () => el.classList.remove('speaking');
  }
  speechSynth.speak(u);
}

function stopSpeech() { if (speechSynth) speechSynth.cancel(); }

// ==================== COPY ====================
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ 已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 复制'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position='fixed';ta.opacity=0;
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    btn.textContent = '✅ 已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 复制'; btn.classList.remove('copied'); }, 2000);
  });
}
function switchToQuiz(){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-tab="quiz"]').classList.add('active');
  currentTab = 'quiz';
  document.getElementById('viewPattern').style.display='none';
  document.getElementById('viewShuffle').style.display='none';
  document.getElementById('viewQuiz').style.display='';
  document.getElementById('toolbar').style.display='none';
  startQuiz();
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('show'),1800);
}

init();
</script>
